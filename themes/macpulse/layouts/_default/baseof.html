<!DOCTYPE html>
<html lang="en">

{{ partial "head.html" . }}

<body>
  {{ partial "nav.html" . }}

  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script>
    // Dark mode toggle
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved) { html.classList.add(saved); }
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) { html.classList.add('dark'); }
    if (toggle) {
      toggle.addEventListener('click', () => {
        html.classList.toggle('dark');
        localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      });
    }

    // Mobile nav toggle
    const burger = document.getElementById('burger');
    const navLinks = document.getElementById('navLinks');
    if (burger && navLinks) {
      burger.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        burger.classList.toggle('active');
      });
    }

    // Search overlay
    const searchToggle = document.getElementById('searchToggle');
    const searchOverlay = document.getElementById('searchOverlay');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const searchClose = document.getElementById('searchClose');

    if (searchToggle && searchOverlay) {
      searchToggle.addEventListener('click', () => {
        searchOverlay.classList.add('active');
        if (searchInput) searchInput.focus();
      });

      searchClose.addEventListener('click', () => {
        searchOverlay.classList.remove('active');
        if (searchInput) searchInput.value = '';
        if (searchResults) searchResults.innerHTML = '';
      });

      searchOverlay.addEventListener('click', (e) => {
        if (e.target === searchOverlay) {
          searchOverlay.classList.remove('active');
          if (searchInput) searchInput.value = '';
          if (searchResults) searchResults.innerHTML = '';
        }
      });

      // Client-side search
      if (searchInput && searchResults && window.ARTICLE_INDEX) {
        searchInput.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase().trim();
          if (!query) {
            searchResults.innerHTML = '';
            return;
          }

          const matches = window.ARTICLE_INDEX.filter(article => {
            return article.title.toLowerCase().includes(query) ||
                   article.summary.toLowerCase().includes(query) ||
                   article.tags.some(tag => tag.toLowerCase().includes(query));
          });

          if (matches.length === 0) {
            searchResults.innerHTML = '<div class="search-empty">No results found</div>';
            return;
          }

          searchResults.innerHTML = matches.map(article => `
            <a href="${article.url}" class="search-result-item">
              <div class="search-result-title">${article.title}</div>
              <div class="search-result-meta">${article.date} · ${article.tags.slice(0, 3).join(' · ')}</div>
            </a>
          `).join('');
        });

        // Keyboard shortcut: Escape to close
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
            searchOverlay.classList.remove('active');
            if (searchInput) searchInput.value = '';
            if (searchResults) searchResults.innerHTML = '';
          }
          // Cmd/Ctrl + K to open search
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
            e.preventDefault();
            searchOverlay.classList.add('active');
            if (searchInput) searchInput.focus();
          }
        });
      }
    }
  </script>
</body>
</html>
