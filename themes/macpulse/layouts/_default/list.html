{{ define "main" }}
<section class="container section">
  <div class="section-header">
    <h2>{{ .Title }}</h2>
  </div>
  <div class="post-list">
    {{ $pages := where site.RegularPages "Type" "blog" }}
    {{ range $pages }}
      <article class="post-list-item">
        <span class="post-date">{{ .Date.Format "2 Jan 2006" }}</span>
        <div class="post-content">
          <h3 class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
          <p class="post-summary">{{ .Summary }}</p>
          <div class="post-meta">
            {{ range .Params.tags }}
              <span class="tag"><a href="/tags/{{ . | urlize }}/">{{ . }}</a></span>
            {{ end }}
            <span class="read-time">{{ .WordCount }} words</span>
          </div>
        </div>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
