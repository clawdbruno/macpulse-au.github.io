<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {{- $title := cond (ne .Title site.Title) (printf "%s — %s" .Title site.Title) site.Title -}}
  {{- $desc := cond (ne .Summary "") .Summary site.Params.description -}}
  {{- $url := .Permalink -}}

  <title>{{ $title }}</title>
  <meta name="description" content="{{ $desc }}">

  <!-- Open Graph -->
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:title" content="{{ $title }}">
  <meta property="og:description" content="{{ $desc }}">
  <meta property="og:url" content="{{ $url }}">
  <meta property="og:site_name" content="Mac Pulse">
  <meta property="og:locale" content="en_AU">
  {{ if .Date }}<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ end }}
  {{ range .Params.tags }}<meta property="article:tag" content="{{ . }}">{{ end }}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ $title }}">
  <meta name="twitter:description" content="{{ $desc }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ $url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate" type="application/rss+xml" title="Mac Pulse RSS" href="/index.xml">

  <!-- Theme -->
  <meta name="theme-color" content="#0071e3">
  <meta name="apple-mobile-web-app-title" content="Mac Pulse">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Mac Pulse",
    "url": "{{ site.BaseURL }}",
    "description": "{{ site.Params.description }}",
    "inLanguage": "en-AU",
    "publisher": {
      "@type": "Organization",
      "name": "Mac Pulse",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.BaseURL }}favicon.svg"
      }
    }
  }
  </script>
  {{ if .IsPage }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": "{{ .Title }}",
    "description": "{{ $desc }}",
    "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
    "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
    "author": {
      "@type": "Organization",
      "name": "Mac Pulse"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Mac Pulse",
      "url": "{{ site.BaseURL }}"
    }
  }
  </script>
  {{ end }}
</head>
