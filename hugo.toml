    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    identifier = 'news'
    name = 'News'
    url = '/blog/'
    weight = 2
  [[menu.main]]
    identifier = 'deals'
    name = 'Deals'
    url = '/tags/deals/'
    weight = 3
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 4
