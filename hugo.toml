baseURL = 'https://clawdbruno.github.io/'
locale = 'en-au'
title = 'Mac Pulse'
theme = 'macpulse'
publishDir = 'public'

[params]
  description = 'Daily Mac news, analysis and deals from Australia'
  defaultTheme = 'dark'
  showFullContent = false
  showWordCounts = true
  twitter = 'macpulse'

[params.author]
  name = 'Mac Pulse'

[outputs]
  home = ['HTML', 'RSS']

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    identifier = 'news'
    name = 'News'
    url = '/blog/'
    weight = 2
  [[menu.main]]
    identifier = 'deals'
    name = 'Deals'
    url = '/tags/deals/'
    weight = 3
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 4
