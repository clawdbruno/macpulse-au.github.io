baseURL = 'https://macpulse-au.github.io/'
languageCode = 'en-au'
title = 'Mac Pulse'
theme = 'paper'
publishDir = 'public'

[params]
  description = 'Daily Mac news, analysis and deals from Australia'
  defaultTheme = 'auto'
  showFullContent = false
  showWordCounts = true

[params.author]
  name = 'Mac Pulse Team'

[outputs]
  home = ['HTML', 'RSS']

